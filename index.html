<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BikeNet Web Bluetooth Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: #0f1115;
        color: #e6e6e6;
      }
      body {
        margin: 0;
        padding: 32px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        max-width: 960px;
      }
      h1 {
        font-size: 24px;
        margin: 0;
      }
      button {
        background: #4c7dff;
        color: white;
        border: none;
        padding: 12px 18px;
        font-size: 14px;
        border-radius: 8px;
        cursor: pointer;
        width: fit-content;
      }
      input {
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #2d3446;
        background: #0f1115;
        color: inherit;
        max-width: 240px;
      }
      button:disabled {
        background: #4b4f5a;
        cursor: not-allowed;
      }
      .card {
        background: #151924;
        border-radius: 12px;
        padding: 16px;
        border: 1px solid #23293a;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        font-size: 12px;
        line-height: 1.4;
        max-height: 60vh;
        overflow: auto;
      }
      .hint {
        color: #a2a8b6;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>BikeNet Web Bluetooth Demo</h1>
    <div class="card">
      <p class="hint">
        Click connect to select the BikeNet hub (eLink) device. Requires Chrome
        with Web Bluetooth enabled. The hub MAC is pulled from advertisements
        when available. If you cannot connect, enter the hub MAC manually.
      </p>
      <label class="hint" for="mac">Hub MAC (eLink)</label>
      <input id="mac" placeholder="AA:BB:CC:DD:EE:FF (optional)" />
      <button id="connect">Connect + Run</button>
    </div>
    <div class="card">
      <p class="hint">Read-only actions (available after connect).</p>
      <div class="actions">
        <button id="action-list" disabled>Get list</button>
        <button id="action-motor" disabled>Get motor params</button>
        <button id="action-map" disabled>Read button map</button>
        <button id="action-table" disabled>Read button table</button>
        <button id="action-cogs" disabled>Get rear cog info</button>
      </div>
    </div>
    <div class="card">
      <pre id="log"></pre>
    </div>
    <script type="module" src="/src/web/index.ts"></script>
  </body>
</html>
