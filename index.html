<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BikeNet Web Bluetooth Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: #0f1115;
        color: #e6e6e6;
      }
      body {
        margin: 0;
        padding: 32px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        max-width: 960px;
      }
      h1 {
        font-size: 24px;
        margin: 0;
      }
      button {
        background: #4c7dff;
        color: white;
        border: none;
        padding: 12px 18px;
        font-size: 14px;
        border-radius: 8px;
        cursor: pointer;
        width: fit-content;
      }
      input {
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #2d3446;
        background: #0f1115;
        color: inherit;
        max-width: 240px;
      }
      button:disabled {
        background: #4b4f5a;
        cursor: not-allowed;
      }
      .card {
        background: #151924;
        border-radius: 12px;
        padding: 16px;
        border: 1px solid #23293a;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        font-size: 12px;
        line-height: 1.4;
        max-height: 60vh;
        overflow: auto;
      }
      .hint {
        color: #a2a8b6;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>BikeNet Web Bluetooth Demo</h1>
    <div class="card">
      <p class="hint">
        Click connect to select the BikeNet hub (eLink) device. Requires Chrome
        with Web Bluetooth enabled. Enter the hub MAC (eLink), since Web
        Bluetooth does not expose it.
      </p>
      <label class="hint" for="mac">Hub MAC (eLink)</label>
      <input id="mac" placeholder="AA:BB:CC:DD:EE:FF" />
      <button id="connect">Connect + Run</button>
    </div>
    <div class="card">
      <pre id="log"></pre>
    </div>
    <script type="module" src="/src/web/index.ts"></script>
  </body>
</html>
