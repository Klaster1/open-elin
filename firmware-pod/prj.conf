# firmware-pod/prj.conf

# Use internal RC oscillator (SuperMini's 32.768 kHz crystal is often faulty)
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=n

# Flash layout for nice_nano UF2 bootloader (MBR at 0x0000, app starts at 0x1000)
CONFIG_FLASH_LOAD_OFFSET=0x1000
CONFIG_BUILD_OUTPUT_UF2=y
CONFIG_BUILD_OUTPUT_UF2_FAMILY_ID="0xADA52840"

# GPIO
CONFIG_GPIO=y

# Reboot support (for bootloader entry)
CONFIG_REBOOT=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2

# USB CDC ACM serial console
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="NXS Pod Firmware"
CONFIG_USB_DEVICE_VID=0x1209
CONFIG_USB_DEVICE_PID=0x0001
CONFIG_UART_LINE_CTRL=y

# Route console and logging to USB serial
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_CDC_ACM_LOG_LEVEL_OFF=y

# BLE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="NXS MTB Pod"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y
CONFIG_BT_MAX_CONN=2

# BLE Security (hub bonds to pod during add-device)
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
CONFIG_BT_SMP_SC_PAIR_ONLY=n

# GATT
CONFIG_BT_GATT_DYNAMIC_DB=n
CONFIG_BT_ATT_TX_COUNT=4

# Flash + NVS for bond persistence
# (partition at 0xEC000, below bootloader at 0xF4000)
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_NVS_LOG_LEVEL_DBG=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_BT_SETTINGS=y

# ADC (battery voltage measurement)
CONFIG_ADC=y

# PWM (battery-level LED pulse indicator)
CONFIG_PWM=y

# Watchdog
CONFIG_WATCHDOG=y

# Power management
CONFIG_PM=y

# System OFF deep sleep (sys_poweroff) — pod powers down when idle on battery,
# wakes via pair-button GPIO DETECT. ~2uA off vs ~1-3mA System ON idle.
CONFIG_POWEROFF=y

# SuperMini has no QSPI flash (Feather board enables it by default)
CONFIG_NORDIC_QSPI_NOR=n
CONFIG_NRFX_QSPI=n
